version: '3.8'

services:
  kaikaio:
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    image: kaikaioano/kaikaio:master
    container_name: kaikaio-nuxt
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3004:80"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NUXT_API_BASE_URL=${NUXT_API_BASE_URL:-http://host.docker.internal:4000/api}
      - NUXT_PUBLIC_API_BASE_URL=${NUXT_PUBLIC_API_BASE_URL:-http://host.docker.internal:4000/api}
